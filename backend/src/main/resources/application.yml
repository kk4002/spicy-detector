server:
  port: 8080

spring:
  application:
    name: spicy-detector

  # ===== 개발/데모용 H2 인메모리 DB =====
  # 운영 전환 시 PostgreSQL 설정으로 교체하고, ddl-auto는 validate/none 권장
  datasource:
    url: jdbc:h2:mem:spicydb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create      # 기동 시 엔티티 기준으로 스키마 생성 (데모용)
    # 스키마(엔티티) 생성 후 data.sql이 실행되도록 지연 초기화
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: always          # data.sql 항상 실행
      encoding: UTF-8       # data.sql 의 한글이 깨지지 않도록 (Windows 기본 인코딩 방지)

logging:
  level:
    com.example.spicydetector: DEBUG

# 앱 전용 설정
app:
  # 프론트 개발 서버 등 CORS 허용 오리진
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
